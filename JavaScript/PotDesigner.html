<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pot Designer - Full Name Lab Library</title>
    <style>
        :root { --bg: #f4f7f6; --panel: #ffffff; --primary: #e67e22; --secondary: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); }
        #sidebar { width: 420px; background: var(--panel); padding: 25px; box-shadow: 2px 0 15px rgba(0,0,0,0.1); overflow-y: auto; z-index: 100; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; color: #444; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 0.9rem; }
        textarea { height: 120px; font-family: 'Courier New', monospace; background: #fafafa; line-height: 1.4; }
        button { width: 100%; padding: 14px; margin-top: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: transform 0.1s; }
        .btn-preview { background: var(--primary); }
        .btn-export { background: var(--secondary); }
        button:active { transform: scale(0.98); }
        #viewer-container { flex-grow: 1; background: #ffffff; position: relative; }
        #status { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.7); color: white; padding: 8px 18px; border-radius: 20px; font-size: 12px; letter-spacing: 0.5px; }
        #logic-info { font-size: 0.85rem; color: #666; font-style: italic; margin-top: 8px; border-left: 3px solid var(--primary); padding-left: 10px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="margin-top:0; color:var(--secondary)">Laboratory Experiments</h2>
    
    <div class="input-group">
        <label>Design Library</label>
        <select id="presetSelect" onchange="applyPreset()">
            </select>
        <div id="logic-info">Select a design to load logic.</div>
    </div>

    <div class="input-group">
        <label>Equation: r(θ,z)</label>
        <textarea id="equation"></textarea>
    </div>

    <div class="input-group"><label>Height (cm)</label><input type="number" id="height" value="10" step="0.1"></div>
    <div class="input-group"><label>Wall Thickness (cm)</label><input type="number" id="wall" value="0.35" step="0.01"></div>
    <div class="input-group"><label>Base Thickness (cm)</label><input type="number" id="base" value="0.5" step="0.1"></div>
    <div class="input-group"><label>Drain Hole Radius (cm)</label><input type="number" id="drain" value="0.5" step="0.1"></div>
    
    <button class="btn-preview" onclick="updatePreview()">RENDER PREVIEW</button>
    <button class="btn-export" onclick="exportOBJ()">DOWNLOAD .OBJ</button>
</div>

<div id="viewer-container">
    <div id="status">Initializing...</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    let scene, camera, renderer, controls, currentMesh;

    // THE FULL NAME LIBRARY
    const library = {
        "Accelerated Turbulence": { eq: "5 * (1 + 0.25 * pow(z / 10.0, 1.1) * (cos(5 * theta + (pi * z / 4.0)) + 0.8 * sin(11 * theta - (pi * z / 8.0))))", desc: "Laminar flow to turbulent vortex shedding." },
        "Circle": { eq: "5", desc: "Pure base for perfect bed adhesion." },
        "5-Petal Flower": { eq: "5 * (1 + 0.25 * cos(5 * theta))", desc: "Classic symmetrical floral profile." },
        "Gear-like": { eq: "5 * (1 + 0.08 * cos(12 * theta))", desc: "Mechanical, technical aesthetic." },
        "Soft Gourd": { eq: "5 * (1 + 0.10 * cos(4 * theta) + 0.05 * sin(2 * theta))", desc: "Handmade, organic ceramic feel." },
        "Wavy Ceramic": { eq: "5 * (1 + 0.08 * cos(3 * theta) + 0.06 * sin(5 * theta))", desc: "Less rigid, mimics hand-thrown clay." },
        "Pumpkin Rib": { eq: "5 * (1 + 0.14 * cos(8 * theta))", desc: "Deep vertical ridges for a natural pot." },
        "Turbine Blade": { eq: "5 * (1 + 0.18 * cos(5 * theta + 0.35 * sin(theta)))", desc: "Dynamic, modern engineered look." },
        "Column Fluting": { eq: "5 * (1 + 0.10 * cos(12 * theta))", desc: "Classic architectural stone pillar style." },
        "Islamic Rosette": { eq: "5 * (1 + 0.14 * cos(8 * theta) + 0.06 * cos(4 * theta))", desc: "Decorative, complex geometric symmetry." },
        "Opening Flower": { eq: "5 * (1 + 0.25 * cos(5 * theta)) * (1 + 0.35 * sin(pi * z / 10))", desc: "Bulges at z=5; petals expand in middle." },
        "Sharpening Top": { eq: "5 * (1 + (0.10 + 0.18 * z / 10) * cos(6 * theta))", desc: "Smooth base that becomes jagged at rim." },
        "Twisted Blossom": { eq: "5 * (1 + 0.22 * cos(5 * theta + pi * z / 10))", desc: "Helical floral design using linear rotation." },
        "3-to-6 Petal Morph (Bulged)": { eq: "5 * (1 + 0.35 * sin(pi * z / 10)) * (1 + 0.25 * (((10 - z) / 10) * cos(3 * theta) + (z / 10) * cos(6 * theta)))", desc: "Morphs from 3 to 6 petals; bulges at center." },
        "3-to-6 Morph (Twisted)": { eq: "5 * (1 + 0.35 * sin(pi * z / 10)) * (1 + 0.25 * (((10 - z) / 10) * cos(3 * (theta + (2*pi*z/30))) + (z / 10) * cos(6 * (theta + (2*pi*z/30)))))", desc: "Twisted 3-to-6 morph (120° over 10cm)." },
        "Fractal Growth": { eq: "5 * (1 + (min(max((z-0.0)/2.5, 0), 1) * 0.18 * cos(3 * theta)) + (min(max((z-2.5)/2.5, 0), 1) * 0.15 * cos(6 * theta)) + (min(max((z-5.0)/2.5, 0), 1) * 0.10 * cos(12 * theta)) + (min(max((z-7.5)/2.5, 0), 1) * 0.08 * cos(24 * theta)))", desc: "Increases complexity every 2.5cm." },
        "Antenna Migration": { eq: "5 * (1 + 0.4 * pow(z / 10.0, 1.5) * abs(cos((2 + 6 * (z / 10.0)) * theta / 2.0)))", desc: "Isotropic Pole to 8-lobe High-Gain Array." },
        "Harmonic Oscillator": { eq: "5 * (1 + 0.25 * abs(cos(pi * 1.0 * z / 10.0)) * cos(7 * theta))", desc: "Rhythmic 'swell' and 'pinch' interference." },
        "Harmonic Beats (AM)": { eq: "5 * (1 + 0.3 * abs(cos(pi * 1.5 * z / 10.0)) * cos(8 * (theta + (pi * z / 20.0))))", desc: "Amplitude Modulation with 90° rotation." },
        "Harmonic Beats (Inv)": { eq: "5 * (1 + 0.3 * abs(cos(pi * 1.5 * (10-z) / 10.0)) * cos(8 * (theta + (pi * (10-z)/ 20.0))))", desc: "Inverted AM with 90° rotation." },
        "DNA Helix (S-Curve)": { eq: "5 * (1 + 0.4 * cos(2 * (theta + (1.2 * sin(2 * pi * z / 10.0)))))", desc: "Double-strand backbone with alternating torsion." },
        "Harmonic Strata Modeling": { eq: "5 + 1 * (min(max(1-abs(z-1),0),1)*cos(3*theta) + min(max(1-abs(z-3),0),1)*cos(5*theta) + min(max(1-abs(z-5),0),1)*cos(7*theta) + min(max(1-abs(z-7),0),1)*cos(9*theta) + min(max(1-abs(z-9),0),1)*cos(11*theta))", desc: "Height-dependent frequency windowing." },
        "Spiral Triple-Helix": { eq: "(5.0 + 2.0 * sin(pi * z / 10.0)) * (1 + 0.20 * cos(3 * theta + pi * z / 10.0))", desc: "Twisted 3-petal design with central bulge." },
        "Bloomfold Vase": { eq: "4.0+1.2*sin(pi*z/10.0)+(0.34+0.42*sin(pi*z/10.0))*(pow(cos(0.5*pi*z/10.0),2)*cos(3*theta)+1.55*pow(sin(pi*z/10.0),2)*cos(6*theta))", desc: "Opens from 3 to 6 lobes through soft bloom." },
        "Trifold Bloom Vase": { eq: "4.0+1.2*sin(pi*z/10.0)+(0.34+0.42*sin(pi*z/10.0))*(pow(cos(pi*z/10.0),2)*cos(3*theta)+1.55*pow(sin(pi*z/10.0),2)*cos(6*theta))", desc: "Swells through 6-lobed bloom to refined crown." },
        "Twisted Trifold Bloom Vase": { eq: "4.0+1.2*sin(pi*z/10.0)+(0.34+0.42*sin(pi*z/10.0))*(pow(cos(pi*z/10.0),2)*cos(3*(theta-pi*z/15.0))+1.55*pow(sin(pi*z/10.0),2)*cos(6*(theta-pi*z/15.0)))", desc: "Rotates 120° during rise through 6-lobed bloom." },
        "DNA Double Helix": { eq: "5 + 0.5 * sin(4 * theta + z) + 0.5 * cos(4 * theta - z)", desc: "Two overlapping waves moving in opposite directions." }
    };

    function populateDropdown() {
        const select = document.getElementById('presetSelect');
        Object.keys(library).forEach(key => {
            const opt = document.createElement('option');
            opt.value = key;
            opt.innerText = key; // Use exact key as full name
            select.appendChild(opt);
        });
    }

    function applyPreset() {
        const key = document.getElementById('presetSelect').value;
        const data = library[key];
        document.getElementById('equation').value = data.eq;
        document.getElementById('logic-info').innerText = data.desc;
        updatePreview();
    }

    window.onload = function() {
        initThree();
        populateDropdown();
        applyPreset();
    };

    function initThree() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xfafafa);
        const container = document.getElementById('viewer-container');
        camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(20, 22, 20);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        scene.add(new THREE.GridHelper(20, 20, 0xbbbbbb, 0xeeeeee));
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const light = new THREE.PointLight(0xffffff, 1);
        light.position.set(20, 30, 10);
        scene.add(light);
        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        animate();
    }

    function updatePreview() {
        if (currentMesh) scene.remove(currentMesh);
        const cfg = getConfig();
        const meshData = generateGeometry(cfg, 1.0, false);
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(meshData.vertices.flat(), 3));
        geometry.setIndex(meshData.indices);
        geometry.computeVertexNormals();
        const material = new THREE.MeshStandardMaterial({ color: 0xbc9b70, side: THREE.DoubleSide, roughness: 0.4 });
        currentMesh = new THREE.Mesh(geometry, material);
        scene.add(currentMesh);
        document.getElementById('status').innerText = "Loaded Experiment: " + document.getElementById('presetSelect').value;
    }

    function getConfig() {
        return {
            eq: document.getElementById('equation').value,
            h: parseFloat(document.getElementById('height').value),
            w: parseFloat(document.getElementById('wall').value),
            b: parseFloat(document.getElementById('base').value),
            d: parseFloat(document.getElementById('drain').value),
            resZ: 100, resT: 180
        };
    }

    function generateGeometry(cfg, scale, isExport) {
        const vertices = [], indices = [];
        const evalR = (z, theta) => { 
            try { 
                const pi = Math.PI, sin = Math.sin, cos = Math.cos, pow = Math.pow, 
                      min = Math.min, max = Math.max, abs = Math.abs, sqrt = Math.sqrt;
                return eval(cfg.eq); 
            } catch(e) { return 5; } 
        };
        const addV = (x, y, z) => {
            if (isExport) vertices.push([x * scale, y * scale, z * scale]); 
            else vertices.push([x * scale, z * scale, -y * scale]); 
            return vertices.length - 1;
        };
        let oRings = [], iRings = [];
        for (let iz = 0; iz <= cfg.resZ; iz++) {
            let zO = cfg.h * (iz/cfg.resZ), zI = cfg.b + (cfg.h-cfg.b)*(iz/cfg.resZ);
            let oR = [], iR = [];
            for (let it = 0; it < cfg.resT; it++) {
                let t = (2*Math.PI*it)/cfg.resT;
                let rO = evalR(zO, t), rI = evalR(zI, t) - cfg.w;
                oR.push(addV(rO*Math.cos(t), rO*Math.sin(t), zO));
                iR.push(addV(rI*Math.cos(t), rI*Math.sin(t), zI));
            }
            oRings.push(oR); iRings.push(iR);
        }
        let hB = [], hT = [];
        for (let it = 0; it < cfg.resT; it++) {
            let t = (2*Math.PI*it)/cfg.resT;
            hB.push(addV(cfg.d*Math.cos(t), cfg.d*Math.sin(t), 0));
            hT.push(addV(cfg.d*Math.cos(t), cfg.d*Math.sin(t), cfg.b));
        }
        for (let it = 0; it < cfg.resT; it++) {
            let it1 = (it + 1) % cfg.resT;
            for (let iz = 0; iz < cfg.resZ; iz++) {
                indices.push(oRings[iz][it], oRings[iz+1][it], oRings[iz+1][it1], oRings[iz][it], oRings[iz+1][it1], oRings[iz][it1]);
                indices.push(iRings[iz][it], iRings[iz][it1], iRings[iz+1][it1], iRings[iz][it], iRings[iz+1][it1], iRings[iz+1][it]);
            }
            indices.push(oRings[cfg.resZ][it], iRings[cfg.resZ][it], iRings[cfg.resZ][it1], oRings[cfg.resZ][it], iRings[cfg.resZ][it1], oRings[cfg.resZ][it1]);
            indices.push(oRings[0][it], hB[it1], hB[it], oRings[0][it], oRings[0][it1], hB[it1]);
            indices.push(iRings[0][it], hT[it], hT[it1], iRings[0][it], hT[it1], iRings[0][it1]);
            indices.push(hB[it], hB[it1], hT[it1], hB[it], hT[it1], hT[it]);
        }
        return { vertices, indices };
    }

    function exportOBJ() {
        const cfg = getConfig();
        const meshData = generateGeometry(cfg, 10.0, true);
        let obj = "# Lab Synthesis Export\n";
        meshData.vertices.forEach(v => obj += `v ${v[0].toFixed(4)} ${v[1].toFixed(4)} ${v[2].toFixed(4)}\n`);
        for(let i=0; i<meshData.indices.length; i+=3) { obj += `f ${meshData.indices[i]+1} ${meshData.indices[i+1]+1} ${meshData.indices[i+2]+1}\n`; }
        const link = document.createElement('a');
        link.href = URL.createObjectURL(new Blob([obj], {type: 'text/plain'}));
        const fileName = document.getElementById('presetSelect').value.replace(/[^a-z0-9]/gi, '_').toLowerCase();
        link.download = fileName + "_lab_export.obj";
        link.click();
    }
</script>
</body>
</html>
